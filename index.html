class _LoginPageState extends State<LoginPage> {
  TextEditingController usernameBox = TextEditingController();
  TextEditingController passwordBox = TextEditingController();
  bool isLoading = false;

  void tapLogin() async {
    if (usernameBox.text.trim().isEmpty) {
      showMessage("Please type your username");
      return;
    }
    if (passwordBox.text.isEmpty) {
      showMessage("Please type your password");
      return;
    }

    setState(() {
      isLoading = true;
    });

    try {
      var response = await http.post(
        Uri.parse(loginUrl),
        headers: {"Content-Type": "application/json"},
        body: jsonEncode({
          "username": usernameBox.text.trim(),
          "password": passwordBox.text,
        }),
      ).timeout(Duration(seconds: 10));

      var data = jsonDecode(response.body);

      if (response.statusCode == 200) {
        myName     = usernameBox.text.trim();
        myUserId   = data["user_id"].toString();
        myUserType = data["user_type"].toString();

        if (data["user_type"] == "User") {
          Navigator.pushReplacement(
            context,
            MaterialPageRoute(builder: (context) => UserHomePage()),
          );
        } else if (data["user_type"] == "Hospital") {
          Navigator.pushReplacement(
            context,
            MaterialPageRoute(builder: (context) => HospitalHomePage()),
          );
        } else if (data["user_type"] == "Driver") {
          Navigator.pushReplacement(
            context,
            MaterialPageRoute(builder: (context) => DriverHomePage()),
          );
        } else {
          showMessage("Unknown user type");
        }
      } else {
        showMessage(data["message"] ?? "Login failed");
      }
    } on TimeoutException {
      showMessage("Server is taking too long. Check if server is running.");
    } catch (e) {
      showMessage("Cannot reach server. Check your IP and wifi. Error: $e");
    }

    setState(() {
      isLoading = false;
    });
  }

  void showMessage(String msg) {
    ScaffoldMessenger.of(context).showSnackBar(
      SnackBar(
        content: Text(msg),
        backgroundColor: Color(0xFFB5001F),
        behavior: SnackBarBehavior.floating,
        shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)),
      ),
    );
  }

  @override

    return Scaffold(
      body: Stack(

class _SignupPageState extends State<SignupPage> {
  TextEditingController nameBox         = TextEditingController();
  TextEditingController emailBox        = TextEditingController();
  TextEditingController phoneBox        = TextEditingController();
  TextEditingController passwordBox     = TextEditingController();
  TextEditingController licenseBox      = TextEditingController();
  TextEditingController vehicleBox      = TextEditingController();
  TextEditingController hospNameBox     = TextEditingController();
  TextEditingController imrBox          = TextEditingController();
  TextEditingController hospLocationBox = TextEditingController();
  TextEditingController hospContactBox  = TextEditingController();

  int selectedType = 0;
  List<String> typeNames = ["User", "Driver", "Hospital"];
  bool isLoading = false;

  void tapSignup() async {
    if (nameBox.text.trim().isEmpty ||
        emailBox.text.trim().isEmpty ||
        phoneBox.text.trim().isEmpty ||
        passwordBox.text.isEmpty) {
      showMessage("Please fill all the fields");
      return;
    }

    if (passwordBox.text.length < 6) {
      showMessage("Password must be at least 6 characters");
      return;
    }

    setState(() {
      isLoading = true;
    });

    Map<String, String> dataToSend = {
      "name"      : nameBox.text.trim(),
      "email"     : emailBox.text.trim(),
      "phone"     : phoneBox.text.trim(),
      "password"  : passwordBox.text,
      "user_type" : typeNames[selectedType],
    };

    if (selectedType == 1) {
      dataToSend["license_no"] = licenseBox.text.trim();
      dataToSend["vehicle_no"] = vehicleBox.text.trim();
    }

    if (selectedType == 2) {
      dataToSend["hospital_name"] = hospNameBox.text.trim();
      dataToSend["imr_no"]        = imrBox.text.trim();
      dataToSend["location"]      = hospLocationBox.text.trim();
      dataToSend["contact_no"]    = hospContactBox.text.trim();
    }

    try {
      var response = await http.post(
        Uri.parse(registerUrl),
        headers: {"Content-Type": "application/json"},
        body: jsonEncode(dataToSend),
      ).timeout(Duration(seconds: 10));

      var data = jsonDecode(response.body);

      if (response.statusCode == 200 || response.statusCode == 201) {
        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(
            content: Text("Account created! Please login now."),
            backgroundColor: Color(0xFF00C853),
            behavior: SnackBarBehavior.floating,
            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)),
          ),
        );
        Navigator.pop(context);
      } else {
        showMessage(data["message"] ?? "Registration failed. Try again.");
      }
    } on TimeoutException {
      showMessage("Server is taking too long. Check if server is running.");
    } catch (e) {
      showMessage("Cannot reach server. Error: $e");
    }

    setState(() {
      isLoading = false;
    });
  }

  void showMessage(String msg) {
    ScaffoldMessenger.of(context).showSnackBar(
      SnackBar(
        content: Text(msg),
        backgroundColor: Color(0xFFB5001F),
        behavior: SnackBarBehavior.floating,
        shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)),

    );

class EmergencyWaitingPage extends StatefulWidget {
  bool isCritical;

  @override
  State<EmergencyWaitingPage> createState() => _EmergencyWaitingPageState();
}

class _EmergencyWaitingPageState extends State<EmergencyWaitingPage>
    with SingleTickerProviderStateMixin {
  int    secondsLeft    = 120;
  Timer? myTimer;
  String statusMessage  = "Sending emergency request...";
  bool   driverWasFound = false;
  String driverName     = "";

  late AnimationController pulseCtrl;
  late Animation<double>   pulseAnim;

  @override
  void initState() {
    super.initState();
    pulseCtrl = AnimationController(
      vsync: this,
      duration: Duration(milliseconds: 900),
    );
    pulseCtrl.repeat(reverse: true);
    pulseAnim = Tween<double>(begin: 0.92, end: 1.08).animate(pulseCtrl);
    startTimer();
    simulateFindingDriver();
  }

  void startTimer() {
    myTimer = Timer.periodic(Duration(seconds: 1), (timer) {
      if (!mounted) return;
      if (secondsLeft <= 0) {
        timer.cancel();
        return;
      }
      setState(() {
        secondsLeft = secondsLeft - 1;
      });
    });
  }

  void simulateFindingDriver() async {
    await Future.delayed(Duration(seconds: 2));
    if (!mounted) return;
    setState(() {
      statusMessage = "Notifying nearby drivers...";
    });

    await Future.delayed(Duration(seconds: 3));
    if (!mounted) return;
    setState(() {
      statusMessage = "Round 1: Looking for drivers within 2km...";
    });

    await Future.delayed(Duration(seconds: 4));
    if (!mounted) return;

    myTimer?.cancel();
    pulseCtrl.stop();
    setState(() {
      driverWasFound = true;
      driverName     = "Ramesh Kumar";
      statusMessage  = "Driver is on the way!";
    });
  }

  @override
  void dispose() {
    myTimer?.cancel();
    pulseCtrl.dispose();
    super.dispose();
  }

  String getTimerText() {
    int minutes = secondsLeft ~/ 60;
    int seconds  = secondsLeft % 60;
    return "${minutes.toString().padLeft(2, "0")}:${seconds.toString().padLeft(2, "0")}";
  }

  Color get mainColor => widget.isCritical ? Color(0xFFE8192C) : Color(0xFFFF6D00);

  @override
  Widget build(BuildContext context) {
    return PopScope(
      canPop: false,
      child: Scaffold(
        backgroundColor: Color(0xFF0D0D0D),
        body: SafeArea(
          child: Padding(
            padding: EdgeInsets.all(22),
            child: Column(
              children: [
                Row(
                  mainAxisAlignment: MainAxisAlignment.spaceBetween,
                  children: [
                    Container(
                      padding: EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                      decoration: BoxDecoration(
                        color: mainColor.withOpacity(0.15),
                        borderRadius: BorderRadius.circular(8),
                        border: Border.all(color: mainColor.withOpacity(0.4)),
                      ),
                      child: Row(
                        children: [
                          Container(
                            width: 6,
                            height: 6,
                            decoration: BoxDecoration(color: mainColor, shape: BoxShape.circle),
                          ),
                          SizedBox(width: 6),
                          Text(
                            widget.isCritical ? "CRITICAL" : "STANDARD",
                            style: TextStyle(color: mainColor, fontSize: 11, fontWeight: FontWeight.bold),
                          ),
                        ],
                      ),
                    ),
                    if (!driverWasFound)
                      TextButton(
                        onPressed: () {
                          showDialog(
                            context: context,
                            builder: (context) => AlertDialog(
                              backgroundColor: Color(0xFF1A1A1A),
                              title: Text("Cancel Emergency?", style: TextStyle(color: Colors.white)),
                              content: Text("Are you sure?", style: TextStyle(color: Color(0xFF888888))),
                              actions: [
                                TextButton(

                                    Navigator.pop(context);

                                  },
                                  child: Text("Yes Cancel", style: TextStyle(color: Color(0xFFE8192C))),
                                ),
                              ],
                            ),
                          );
                        },
                        child: Text("Cancel", style: TextStyle(color: Color(0xFF888888), fontSize: 13)),
                      ),
                  ],
                ),
                SizedBox(height: 36),
                if (!driverWasFound) ...[
                  ScaleTransition(
                    scale: pulseAnim,
                    child: Stack(
                      alignment: Alignment.center,
                      children: [
                        Container(
                          width: 160,
                          height: 160,

                            shape: BoxShape.circle,

                        ),
                        Container(
                          width: 120,

                        ),
                        Container(

                            shape: BoxShape.circle,

                          ),
                          child: Icon(Icons.local_hospital, color: Colors.white, size: 40),
                        ),
                      ],
                    ),
                  ),
                  SizedBox(height: 28),
                  Text(
                    getTimerText(),
                    style: TextStyle(color: mainColor, fontSize: 54, fontWeight: FontWeight.w900, letterSpacing: -2),
                  ),
                  Text(
                    "Searching for driver",
                    style: TextStyle(color: Color(0xFF888888), fontSize: 13),
                  ),
                  SizedBox(height: 20),
                  ClipRRect(
                    borderRadius: BorderRadius.circular(6),
                    child: LinearProgressIndicator(
                      value: 1 - (secondsLeft / 120),
                      backgroundColor: Color(0xFF1A1A1A),
                      valueColor: AlwaysStoppedAnimation(mainColor),

                    ),
                  ),
                ] else ...[
                  Container(

                            SizedBox(width: 14),
                            Column(
                              crossAxisAlignment: CrossAxisAlignment.start,

class _DriverHomeTabState extends State<DriverHomeTab> {
  bool amIOnline      = false;
  bool showingRequest = false;
  bool isAccepting    = false;

  void tapGoOnline() {
    setState(() {
      amIOnline = true;
    });
    Future.delayed(Duration(seconds: 4), () {
      if (mounted && amIOnline) {
        setState(() {
          showingRequest = true;
        });
      }
    });
  }

  void tapGoOffline() {
    setState(() {
      amIOnline      = false;
      showingRequest = false;
    });
  }

  void tapAccept() async {
    setState(() {
      isAccepting = true;
    });
    await Future.delayed(Duration(seconds: 1));
    if (!mounted) return;
    setState(() {
      showingRequest = false;
      isAccepting    = false;
    });
    Navigator.push(
      context,
      MaterialPageRoute(
        builder: (context) => DriverTripPage(
          emergencyId : fakeEmergencyRequest["emergency_id"],
          patientName : fakeEmergencyRequest["patient_name"],
          location    : fakeEmergencyRequest["location"],
          isCritical  : fakeEmergencyRequest["emergency_type"] == "Critical",
        ),
      ),
    );
  }

  void tapDecline() {
    setState(() {
      showingRequest = false;
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      backgroundColor: Color(0xFF0D0D0D),
      body: SafeArea(
        child: SingleChildScrollView(

class _DriverTripPageState extends State<DriverTripPage> {
  String? pickedHospitalId;
  String? pickedHospitalName;
  bool isSending   = false;
  bool sentAlready = false;

  void tapSendToHospital() async {
    if (pickedHospitalId == null) {
      ScaffoldMessenger.of(context).showSnackBar(
        SnackBar(
          content: Text("Please select a hospital first"),
          backgroundColor: Color(0xFFB5001F),
          behavior: SnackBarBehavior.floating,
          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(10)),
        ),
      );
      return;
    }

    setState(() {
      isSending = true;
    });

    await Future.delayed(Duration(seconds: 2));

    if (!mounted) return;
    setState(() {
      isSending   = false;
      sentAlready = true;
    });
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      backgroundColor: Color(0xFF0D0D0D),
      appBar: AppBar(
        backgroundColor: Color(0xFF0D0D0D),
        title: Text("Active Trip", style: TextStyle(fontWeight: FontWeight.bold, fontSize: 17)),
        automaticallyImplyLeading: false,
      ),
      body: SingleChildScrollView(
        padding: EdgeInsets.all(22),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            if (sentAlready) ...[
              Container(
                width: double.infinity,
                padding: EdgeInsets.all(20),
                decoration: BoxDecoration(
                  color: Color(0xFF00C853).withOpacity(0.1),
                  borderRadius: BorderRadius.circular(16),
                  border: Border.all(color: Color(0xFF00C853).withOpacity(0.4), width: 1.5),
                ),
                child: Column(
                  children: [
                    Icon(Icons.check_circle, color: Color(0xFF00C853), size: 48),
                    SizedBox(height: 12),
                    Text(
                      "Hospital Notified!",
                      style: TextStyle(color: Color(0xFF00C853), fontSize: 18, fontWeight: FontWeight.bold),
                    ),
                    SizedBox(height: 6),
                    Text(
                      "$pickedHospitalName is ready for the patient",
                      style: TextStyle(color: Color(0xFF888888), fontSize: 13),
                      textAlign: TextAlign.center,
                    ),
                  ],
                ),
              ),
              SizedBox(height: 20),
              MyRedButton(
                text: "Done - Back to Home",
                buttonColor: Color(0xFF00C853),
                onTap: () => Navigator.popUntil(context, (route) => route.isFirst),
              ),
            ] else ...[
              Container(
                padding: EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: Color(0xFF1A1A1A),
                  borderRadius: BorderRadius.circular(14),
                  border: Border.all(color: Color(0xFF2A2A2A)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Row(
                      children: [
                        Container(
                          padding: EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                          decoration: BoxDecoration(
                            color: widget.isCritical ? Color(0xFFE8192C) : Color(0xFFFF6D00),
                            borderRadius: BorderRadius.circular(6),
                          ),
                          child: Text(
                            widget.isCritical ? "CRITICAL" : "STANDARD",
                            style: TextStyle(color: Colors.white, fontSize: 10, fontWeight: FontWeight.bold),
                          ),
                        ),
                        SizedBox(width: 10),
                        Text(
                          "Emergency #${widget.emergencyId}",
                          style: TextStyle(color: Color(0xFF888888), fontSize: 12),
                        ),
                      ],
                    ),
                    SizedBox(height: 12),
                    buildPatientRow(Icons.person_outline,         "Patient",   widget.patientName),
                    SizedBox(height: 8),
                    buildPatientRow(Icons.location_on_outlined,   "Pickup",    widget.location),
                    SizedBox(height: 8),
                    buildPatientRow(Icons.bloodtype_outlined,     "Blood",     fakeEmergencyRequest["blood_group"]),
                    SizedBox(height: 8),
                    buildPatientRow(Icons.sick_outlined,          "Diseases",  fakeEmergencyRequest["existing_diseases"]),

                onTap: tapSendToHospital,
                isLoading: isSending,

              SizedBox(height: 20),

      ),
    );
  }

      crossAxisAlignment: CrossAxisAlignment.start,
      children: [

                                buildPatRow(Icons.sick_outlined,          "Existing Diseases", patient["existing_diseases"]),
                                SizedBox(height: 8),
                                buildPatRow(Icons.warning_amber_outlined, "Allergies",         patient["allergies"]),
                                SizedBox(height: 8),
                                buildPatRow(Icons.note_outlined,          "Reports",           patient["reports_notes"]),
                                SizedBox(height: 8),
                                buildPatRow(Icons.location_on_outlined,   "Pickup From",       patient["pickup_location"]),
                                SizedBox(height: 8),
                                buildPatRow(Icons.local_taxi_outlined,    "Driver",            patient["driver_name"]),
                                SizedBox(height: 8),
                                buildPatRow(Icons.access_time_outlined,   "Arrival",           patient["arrival_time"]),
                              ],
                            ),
                          ),
                          Padding(
                            padding: EdgeInsets.symmetric(horizontal: 15, vertical: 10),
                            child: Row(
                              children: [
                                Container(
                                  padding: EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                                  decoration: BoxDecoration(
                                    color: Color(0xFF00C853).withOpacity(0.15),
                                    borderRadius: BorderRadius.circular(8),
                                  ),
                                  child: Text(
                                    patient["status"],
                                    style: TextStyle(color: Color(0xFF00C853), fontSize: 12, fontWeight: FontWeight.bold),
                                  ),
                                ),
                                SizedBox(width: 10),
                                Text(
                                  "ID: #${patient["id"]}",
                                  style: TextStyle(color: Color(0xFF888888), fontSize: 12),
                                ),
                              ],
                            ),
                          ),
                        ],
                      ),
                    ),
                  );
                },
              ),
            ),
          ],
        ),
      ),
    );
  }

  Widget buildPatRow(IconData icon, String label, String value) {
    return Row(
      crossAxisAlignment: CrossAxisAlignment.start,
      children: [
        Icon(icon, color: Color(0xFF888888), size: 15),
        SizedBox(width: 9),
        Text("$label:  ", style: TextStyle(color: Color(0xFF888888), fontSize: 12)),
        Expanded(
          child: Text(value, style: TextStyle(color: Colors.white, fontSize: 12, fontWeight: FontWeight.w500)),
        ),
      ],
    );
  }
}
